name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor WASM
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"

          dotnet publish TernaryWorkbench/src/TernaryWorkbench.Web/TernaryWorkbench.Web.csproj \
            --configuration Release \
            --output publish

          # Fix <base href> for GitHub Pages subdirectory (e.g. /ternary-workbench-unity/)
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|" publish/wwwroot/index.html

          # 404.html = index.html so Blazor's client-side router handles deep links
          cp publish/wwwroot/index.html publish/wwwroot/404.html

          # Prevent Jekyll from ignoring the _framework folder
          touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
